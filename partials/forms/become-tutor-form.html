<form class="tutor-form book-demo-form">

    <!-- Personal Details -->
    <h3>Personal Information</h3>
    <div class="form-row">
        <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        
        <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
            <label for="gender">Gender *</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
    </div>


    <!-- Contact Details -->
    <h3>Contact Information</h3>
    
    <div class="form-row">
        <div class="form-group">
            <label for="whatsapp">WhatsApp Number *</label>
            <div>
                <span>+91</span>
                <input type="tel" id="whatsapp" name="whatsapp" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="altNumber">Alternative Number</label>
            <div>
                <span>+91</span>
                <input type="tel" id="altNumber" name="altNumber">
            </div>
        </div>
        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
        </div>
    </div>
    
    
    
    
    <div class="form-row">
        <div class="form-group">
            <label for="familyMobile">Mobile No. of Family Member *</label>
            <div>
                <span>+91</span>
                <input type="tel" id="familyMobile" name="familyMobile" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="relation">Relation with Family Member *</label>
            <input type="text" id="relation" name="relation" required>
        </div>
    </div>
    
    


    <!-- Personal Info -->
    <h3>Additional Details</h3>

    <div class="form-row">
        <div class="form-group">
            <label for="dob">Date of Birth *</label>
            <input type="date" id="dob" name="dob" required>
        </div>
        <div class="form-group">
            <label for="maritalStatus">Marital Status *</label>
            <select id="maritalStatus" name="maritalStatus" required>
                <option value="">Select</option>
                <option>Single</option>
                <option>Married</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="vehicle">Own Vehicle *</label>
            <select id="vehicle" name="vehicle" required>
                <option value="">Select</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>
    </div>
    
    


    <!-- Address -->
    <h3>Address Information</h3>

    <div class="form-row">
        <div class="form-group">
            <label for="presentAddress">Present Address *</label>
            <textarea id="presentAddress" name="presentAddress" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="permanentAddress">Permanent Address (If Different from Present One)</label>
            <textarea id="permanentAddress" name="permanentAddress"></textarea>
        </div>
        
        <div class="form-group">
            <label for="residentialStatus">Residential Status *</label>
            <select id="residentialStatus" name="residentialStatus" required>
                <option value="">Select</option>
                <option>Owned</option>
                <option>Rented</option>
                <option>PG/Hostel</option>
            </select>
        </div>
    </div>

    


    <!-- Education -->
    <h3>Education</h3>

    <div class="form-row">
        <div class="form-group">
            <label for="qualification">Highest Qualification *</label>
            <input type="text" id="qualification" name="qualification" required>
        </div>
        
        <div class="form-group">
            <label for="additionalQualification">Additional Qualification</label>
            <input type="text" id="additionalQualification" name="additionalQualification">
        </div>
        
        <div class="form-group">
            <label for="englishFluency">Fluency in English *</label>
            <select id="englishFluency" name="englishFluency" required>
                <option value="">Select</option>
                <option>Basic</option>
                <option>Intermediate</option>
                <option>Fluent</option>
            </select>
        </div>
    </div>

    
    


    <!-- Teaching -->
    <h3>Teaching Details</h3>

    <div class="form-row">
        <div class="form-group">
            <label for="experience">Teaching Experience (In Years) *</label>
            <input type="number" id="experience" name="experience" min="0" required>
        </div>
        
        <div class="form-group">
            <label for="schoolTeaching">Teaching in Any School *</label>
            <select id="schoolTeaching" name="schoolTeaching" required>
                <option value="">Select</option>
                <option>Yes</option>
                <option>No</option>
            </select>
        </div>
    </div>

    

    <div class="form-group">
        <label for="schoolDetails">Name and Address of School (Presently Teaching or Taught)</label>
        <textarea id="schoolDetails" name="schoolDetails"></textarea>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="classes">Mention Classes (You Want to Teach) *</label>
            <input type="text" id="classes" name="classes" required placeholder="1st, 4th, 9th, 11th, B.Com, etc.">
        </div>

        <div class="form-group">
            <label for="subjects">Mention Subjects (You Want to Teach) *</label>
            <input type="text" id="subjects" name="subjects" required placeholder="English, Maths, Chemistry, etc.">
        </div>

        <div class="form-group">
            <label for="areas">Mention Areas You Can Go to Teach *</label>
            <input type="text" id="areas" name="areas" placeholder="Pitampura, Rohini, etc." required>
        </div>
    </div>


    <!-- Other Info -->
    <h3>Other Information</h3>

    <div class="form-group">
        <label for="advertisement">How you got to know about us? *</label>
        <input type="text" id="advertisement" name="advertisement" placeholder="Google, Facebook, Word of Mouth, etc." required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="friendName">Name of Friend Referred You</label>
            <input type="text" id="friendName" name="friendName">
        </div>

        <div class="form-group">
            <label for="friendContact">Friend’s Contact Number</label>
            <div>
                <span>+91</span>
                <input type="tel" id="friendContact" name="friendContact">
            </div>
        </div>
    </div>
    

    <div class="form-group">
        <label for="comment">Any Comment or Suggestion</label>
        <textarea id="comment" name="comment" placeholder="Anything you'd like to share with us..."></textarea>
    </div>

    <!-- Terms -->
    <div class="form-group">
        <div class="form-terms">
            <input type="checkbox" id="terms" required>
            <label for="terms">
            I have read and agree to the Terms & Conditions before submitting this form.
            </label>
        </div>
    </div>

    <button type="submit" class="submit-btn">Submit Application</button>

</form>
